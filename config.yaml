server:
  ui_port: 3000
  otlp_http_port: 4318
  grpc_port: 4317

database:
  path: "./litetrace.db"  # SQLite path; use "postgres://..." for Postgres

processor:
  batch_size: 500
  flush_interval_ms: 100

# Model costs — USD per 1M tokens: [input, output]
# This is the single source of truth. Keys are matched by substring (longest wins),
# so "gpt-4o-mini" is checked before "gpt-4o". Ollama model:tag suffixes are stripped
# automatically, so "llama3:8b" matches a key of "llama3".
costs:
  # ── OpenAI ──────────────────────────────────────────────────────────────────
  gpt-4o-mini:      [0.15,   0.60]
  gpt-4o:           [2.50,  10.00]
  gpt-4:            [30.00, 60.00]
  gpt-3.5-turbo:    [0.50,   1.50]
  o1-mini:          [1.10,   4.40]
  o1:               [15.00,  60.00]
  o3-mini:          [1.10,   4.40]

  # ── Anthropic ───────────────────────────────────────────────────────────────
  claude-opus-4:       [15.00, 75.00]
  claude-3-opus:       [15.00, 75.00]
  claude-sonnet-4:     [3.00,  15.00]
  claude-3-5-sonnet:   [3.00,  15.00]
  claude-haiku-4:      [0.80,   4.00]
  claude-3-5-haiku:    [0.80,   4.00]
  claude-3-haiku:      [0.25,   1.25]

  # ── Google ───────────────────────────────────────────────────────────────────
  gemini-2.5-pro:      [1.25,  10.00]
  gemini-2.0-flash:    [0.10,   0.40]
  gemini-1.5-pro:      [1.25,   5.00]
  gemini-1.5-flash:    [0.075,  0.30]

  # ── Ollama / local ───────────────────────────────────────────────────────────
  # Cost is $0 for local inference. Set a non-zero rate to track GPU/electricity.
  "gpt-oss:20b":    [0.60,   0.30]
  llama3.3:         [0.0,    0.0]
  llama3.2:         [0.0,    0.0]
  llama3.1:         [0.0,    0.0]
  llama3:           [0.0,    0.0]
  llama2:           [0.0,    0.0]
  mistral-nemo:     [0.0,    0.0]
  mistral:          [0.0,    0.0]
  mixtral:          [0.0,    0.0]
  qwen2.5-coder:    [0.0,    0.0]
  qwen2.5:          [0.0,    0.0]
  qwen2:            [0.0,    0.0]
  deepseek-r1:      [0.0,    0.0]
  deepseek-coder:   [0.0,    0.0]
  gemma3:           [0.0,    0.0]
  gemma2:           [0.0,    0.0]
  phi4:             [0.0,    0.0]
  phi3:             [0.0,    0.0]
  codellama:        [0.0,    0.0]
  starcoder2:       [0.0,    0.0]
  nomic-embed-text: [0.0,    0.0]
  mxbai-embed:      [0.0,    0.0]
